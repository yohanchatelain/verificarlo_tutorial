name: Build tutorial artifacts
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main-en.tex
          args: -pdf -file-line-error -interaction=nonstopmode

      - name: Upload pdf
        uses: actions/upload-artifact@v4
        with:
          name: verificarlo-tutorial.pdf
          path: main-en.pdf

      - name: Tar sources
        run: tar cvf verificarlo-tutorial.tar.gz verificarlo-tutorial/

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: verificarlo-tutorial.tar.gz
          path: verificarlo-tutorial.tar.gz

  test_notebook:
    runs-on: ubuntu-latest
    container: verificarlo/verificarlo:latest
    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Install notebook dependencies
        run: python3 -m pip install --no-cache-dir numpy scipy pandas matplotlib significantdigits jupyter nbconvert ipykernel

      - name: Execute notebook
        run: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=1800 --output tutorial-executed.ipynb tutorial.ipynb

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-executed.ipynb
          path: tutorial-executed.ipynb
